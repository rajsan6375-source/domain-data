        :root {
            --primary-color: #0ea5e9;
            --primary-hover: #0284c7;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;

            --orange-border: #fed7aa;
            --blue-cell: #e0f2fe;
            --blue-cell-text: #0369a1;
            --blue-cell-border: #bae6fd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 15px;
        }

        /* 2-Column Main Layout */
        .main-layout {
            display: flex;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
            align-items: flex-start;
        }

        /* Left Side: Data & Management */
        .left-content {
            flex: 3;
            min-width: 0; /* Prevents grid breakout */
        }

        /* Right Side: Orange Column for SEO Sites */
        .right-sidebar {
            flex: 1;
            min-width: 320px;
            max-width: 400px;
            background-color: var(--orange-column);
            border: 2px solid var(--orange-border);
            border-radius: 12px;
            padding: 15px;
            position: sticky;
            top: 15px;
            max-height: calc(100vh - 30px);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--orange-border);
        }

        .sidebar-header h2 {
            font-size: 16px;
            color: #ea580c;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sidebar-header p {
            font-size: 11px;
            color: #c2410c;
        }

        /* Scrollable Area for 200 Cells */
        .seo-cells-container {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 5px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Blue SEO Cells */
        .seo-cell {
            background-color: var(--blue-cell);
            color: var(--blue-cell-text);
            border: 1px solid var(--blue-cell-border);
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.1s ease;
            user-select: none;
        }

        .seo-cell:hover {
            background-color: #bae6fd;
            transform: translateX(3px);
        }

        .seo-cell-num {
            font-size: 10px;
            background: #0284c7;
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
        }

        .seo-cell.copied {
            background-color: var(--success-color) !important;
            color: var(--success-text) !important;
            border-color: #bbf7d0 !important;
        }

        /* Existing Dashboard Elements */
        header {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        header h1 { font-size: 22px; color: var(--primary-hover); }
        header p { color: var(--text-muted); font-size: 13px; }

        .domain-tabs-container {
            overflow-x: auto;
            white-space: nowrap;
            background: #ffffff;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .domain-tab {
            display: inline-block;
            padding: 8px 16px;
            margin-right: 8px;
            background-color: #f8fafc;
            color: var(--text-main);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.15s ease;
            border: 1px solid var(--border-color);
        }

        .domain-tab.active {
            background-color: var(--primary-hover);
            color: white;
            font-weight: bold;
            border-color: var(--primary-hover);
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .data-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            position: relative;
            user-select: none;
            transition: transform 0.1s, background-color 0.1s, border-color 0.1s;
        }

        .data-card:hover { transform: translateY(-2px); border-color: var(--primary-color); }
        .card-header { font-size: 10px; color: var(--primary-hover); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: bold; display: flex; justify-content: space-between; }
        .copy-indicator { font-size: 9px; color: var(--text-muted); font-weight: normal; }
        .card-content { font-size: 14px; color: var(--text-main); word-break: break-word; font-weight: 500; line-height: 1.4; }

        .data-card.copied { background-color: var(--success-color) !important; border-color: var(--success-text) !important; }
        .data-card.copied .card-content, .data-card.copied .copy-indicator { color: var(--success-text); }

        /* Custom Scrollbar for Right Side */
        .seo-cells-container::-webkit-scrollbar { width: 6px; }
        .seo-cells-container::-webkit-scrollbar-track { background: var(--orange-column); }
        .seo-cells-container::-webkit-scrollbar-thumb { background: #fed7aa; border-radius: 10px; }
    </style>
</head>

    function renderTabs() {
        const tabsContainer = document.getElementById('tabsContainer');
        tabsContainer.innerHTML = '';
        headers.forEach((domain, index) => {
            const tab = document.createElement('div');
            tab.className = `domain-tab ${index === currentTabIndex ? 'active' : ''}`;
            tab.id = `tab-${index}`;
            tab.innerText = domain;
            tab.onclick = () => switchTab(index);
            tabsContainer.appendChild(tab);
        });
        showDomainData(headers[currentTabIndex]);
    }

    function switchTab(index) {
        if(index < 0 || index >= headers.length) return;
        document.querySelectorAll('.domain-tab').forEach(t => t.classList.remove('active'));
        currentTabIndex = index;
        const activeTab = document.getElementById(`tab-${index}`);
        activeTab.classList.add('active');
        activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        showDomainData(headers[currentTabIndex]);
    }

    function setupKeyboardNavigation() {
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') switchTab(currentTabIndex + 1);
            else if (e.key === 'ArrowLeft') switchTab(currentTabIndex - 1);
        });
    }

    function showDomainData(domain) {
        const dataGrid = document.getElementById('dataGrid');
        dataGrid.innerHTML = '';
        const fields = sheetData[domain] || {};

        Object.keys(fields).forEach((fieldName) => {
            const fieldValue = fields[fieldName];
            const card = document.createElement('div');
            card.className = `data-card ${fieldName === 'Password' ? 'password-field' : ''}`;
            card.onclick = () => copyText(fieldValue, card, 'Copied!');
            
            card.innerHTML = `
                <div class="card-header">
                    <span>${fieldName}</span>
                    <span class="copy-indicator">Click to Copy</span>
                </div>
                <div class="card-content">${escapeHtml(fieldValue)}</div>
            `;
            dataGrid.appendChild(card);
        });
    }

    // Generate 200 SEO Blue Cells into Orange Column
    function renderSeoCells() {
        const container = document.getElementById('seoCellsContainer');
        container.innerHTML = '';

        seoWebsites.forEach((site, index) => {
            const cell = document.createElement('div');
            cell.className = 'seo-cell';
            const fullUrl = `https://www.${site}`;
            cell.onclick = () => copyText(fullUrl, cell, 'Copied URL!');

            cell.innerHTML = `
                <span>${site}</span>
                <span class="seo-cell-num">#${index + 1}</span>
            `;
            container.appendChild(cell);
        });
    }

    function copyText(text, element, successMsg) {
        navigator.clipboard.writeText(text).then(() => {
            element.classList.add('copied');
            
            // For standard cards
            const indicator = element.querySelector('.copy-indicator');
            if(indicator) indicator.innerText = successMsg;

            setTimeout(() => {
                element.classList.remove('copied');
                if(indicator) indicator.innerText = 'Click to Copy';
            }, 600);
        }).catch(err => console.error('Copy Error', err));
    }

    function escapeHtml(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
