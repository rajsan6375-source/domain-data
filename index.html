    <style>
        :root {
            --primary-color: #0ea5e9;
            --primary-hover: #0284c7;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success-color: #dcfce7;
            --success-text: #166534;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 15px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        header h1 {
            font-size: 22px;
            color: var(--primary-hover);
        }

        header p {
            color: var(--text-muted);
            font-size: 13px;
        }

        /* Domain Tabs Row */
        .domain-tabs-container {
            overflow-x: auto;
            white-space: nowrap;
            background: var(--card-bg);
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .domain-tab {
            display: inline-block;
            padding: 8px 16px;
            margin-right: 8px;
            background-color: #f8fafc;
            color: var(--text-main);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.15s ease;
            border: 1px solid var(--border-color);
        }

        .domain-tab.active {
            background-color: var(--primary-hover);
            color: white;
            font-weight: bold;
            border-color: var(--primary-hover);
        }

        /* Data Grid Container */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        /* Clickable Card Styling */
        .data-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            position: relative;
            user-select: none;
            transition: transform 0.1s, background-color 0.1s, border-color 0.1s;
        }

        .data-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary-color);
        }

        .data-card:active {
            transform: scale(0.98);
        }

        .card-header {
            font-size: 10px;
            color: var(--primary-hover);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .copy-indicator {
            font-size: 9px;
            color: var(--text-muted);
            font-weight: normal;
        }

        .card-content {
            font-size: 14px;
            color: var(--text-main);
            word-break: break-word;
            font-weight: 500;
            line-height: 1.4;
        }

        /* Highlight special Password card */
        .data-card.password-field .card-header {
            color: #e11d48; /* Red tint for password header */
        }

        /* Success Active State when Copied */
        .data-card.copied {
            background-color: var(--success-color) !important;
            border-color: var(--success-text) !important;
        }
        
        .data-card.copied .card-content {
            color: var(--success-text);
        }

        .data-card.copied .copy-indicator {
            color: var(--success-text);
            font-weight: bold;
        }
    </style>
</head>
<body>

    let currentTabIndex = 0;
    const headers = Object.keys(sheetData);

    window.onload = function() {
        renderTabs();
        setupKeyboardNavigation();
    };

    function renderTabs() {
        const tabsContainer = document.getElementById('tabsContainer');
        tabsContainer.innerHTML = '';

        headers.forEach((domain, index) => {
            const tab = document.createElement('div');
            tab.className = `domain-tab ${index === currentTabIndex ? 'active' : ''}`;
            tab.id = `tab-${index}`;
            tab.innerText = domain;
            tab.onclick = () => switchTab(index);
            tabsContainer.appendChild(tab);
        });

        showDomainData(headers[currentTabIndex]);
    }

    function switchTab(index) {
        if(index < 0 || index >= headers.length) return;
        
        document.querySelectorAll('.domain-tab').forEach(t => t.classList.remove('active'));
        currentTabIndex = index;
        
        const activeTab = document.getElementById(`tab-${index}`);
        activeTab.classList.add('active');
        activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        
        showDomainData(headers[currentTabIndex]);
    }

    function setupKeyboardNavigation() {
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                switchTab(currentTabIndex + 1);
            } else if (e.key === 'ArrowLeft') {
                switchTab(currentTabIndex - 1);
            }
        });
    }

    function showDomainData(domain) {
        const dataGrid = document.getElementById('dataGrid');
        dataGrid.innerHTML = '';

        const fields = sheetData[domain] || {};

        Object.keys(fields).forEach((fieldName) => {
            const fieldValue = fields[fieldName];
            const card = document.createElement('div');
            // Password ko visually identify karne ke liye alag class laga di hai
            card.className = `data-card ${fieldName === 'Password' ? 'password-field' : ''}`;
            card.onclick = () => copyText(fieldValue, card);
            
            card.innerHTML = `
                <div class="card-header">
                    <span>${fieldName}</span>
                    <span class="copy-indicator">Click to Copy</span>
                </div>
                <div class="card-content">${escapeHtml(fieldValue)}</div>
            `;
            dataGrid.appendChild(card);
        });
    }

    function copyText(text, cardElement) {
        navigator.clipboard.writeText(text).then(() => {
            cardElement.classList.add('copied');
            cardElement.querySelector('.copy-indicator').innerText = 'Copied!';
            
            setTimeout(() => {
                cardElement.classList.remove('copied');
                cardElement.querySelector('.copy-indicator').innerText = 'Click to Copy';
            }, 600);
        }).catch(err => console.error('Copy Error: ', err));
    }

    function escapeHtml(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
</script>
